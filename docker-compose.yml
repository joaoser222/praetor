version: '3.8'

services:
  api:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/database.db
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - praetor-network

  worker:
    build: .
    volumes:
      - .:/app
    command: celery -A core.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/database.db
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - praetor-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - praetor-network

networks:
  praetor-network:
    driver: bridge

volumes:
  sqlite_data:
